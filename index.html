  <!-- STYLE GIỮ NGUYÊN -->
  <style>
    #scrollTop {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 99;
      width: 42px;
      height: 42px;
      background: var(--gold-dim);
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.3s, transform 0.3s, background 0.3s;
      pointer-events: none;
    }
    #scrollTop.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #scrollTop:hover { background: var(--gold); }
    #scrollTop svg { width: 16px; height: 16px; stroke: var(--gold-light); }
    #scrollTop:hover svg { stroke: var(--dark); }
  </style>
